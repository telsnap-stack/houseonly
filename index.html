    <!-- Inter font: the logo and UI request 'Inter' but it was never loaded,
         so the browser fell back to the system font (rendering the logo thin
         and inconsistent across devices). Load the real Inter incl. weight 900
         (Black) for the logo. preconnect speeds up the fetch; display=swap
         avoids invisible text while loading. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800;900&display=swap" rel="stylesheet" />
    <style>
      body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
